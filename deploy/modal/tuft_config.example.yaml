# TuFT config for a Modal deployment — edit this, then:
#   python deploy/modal/launch.py --config deploy/modal/tuft_config.example.yaml --gpu H100
#
# This is a STANDARD tuft_config.yaml (the same schema `tuft launch --config` reads
# locally / in Docker), so the file stays portable across all deploy targets.
# launch.py reads it, embeds it, and renders a Modal app — you never edit Python.
#
# Modal-specific notes:
#   - launch.py PINS checkpoint_dir to a Modal Volume (/data/checkpoints) via
#     --checkpoint-dir, so the value below is just a portable default.
#   - The HuggingFace cache is a Modal Volume (HF_HOME) so weights aren't re-downloaded.
#   - Single GPU? keep ONE model with `colocate: true`. Multiple models need
#     `colocate: false` + more GPUs (see deploy/README.md "Multiple base models").

checkpoint_dir: /data/checkpoints
model_owner: modal-user

supported_models:
  - model_name: Qwen/Qwen3-4B
    model_path: Qwen/Qwen3-4B        # HF id (cached to the Volume) OR a mounted local path
    max_model_len: 32768
    tensor_parallel_size: 1          # >1 needs a multi-GPU box: launch.py --gpu H100:2
    colocate: true                   # one GPU: training + vLLM share it (single model only)
    sampling_memory_fraction: 0.4    # vLLM's share of the GPU in colocate mode
    max_lora_rank: 16
    max_loras: 1
    # Optional knobs (see src/tuft/config.py ModelConfig):
    # quantization: fp8              # fp8 | awq | gptq | bitsandbytes
    # sampling_max_model_len: 4096   # cap vLLM context to save KV-cache memory
    # training_backend: fsdp         # multi-GPU training (also set launch.py --gpu H100:N)
    # temperature: 0.7
    # top_p: 0.9

authorized_users:
  # API keys MUST start with "tml-" (Tinker SDK requirement). Generate a strong one:
  #   python -c "import secrets; print('tml-' + secrets.token_urlsafe(24))"
  tml-CHANGE-ME-to-a-strong-key: modal-user

persistence:
  mode: DISABLE                      # checkpoints (on the Volume) are the durable artifact

telemetry:
  enabled: false

# Optional Modal infra for launch.py. With this section, `python deploy/modal/launch.py
# --config <this file>` needs NO other flags. CLI flags override these; TuFT ignores this
# whole section (launch.py strips it before the server sees the config), so the file still
# works with `tuft launch --config` locally. Keys mirror launch.py's flags:
# modal:
#   gpu: H100                        # H100 | A100-80GB | L4 | H100:2 ...
#   name: tuft-server
#   scaledown: 1200
#   min_containers: 0                # 1 = keep warm (no scale-to-zero)
#   max_containers: 1
#   proxy_auth: false                # true adds Modal gateway auth (breaks the plain Tinker SDK)
#   hf_secret: ""                    # Modal secret name with HF_TOKEN, for gated models
#   image: ghcr.io/agentscope-ai/tuft:latest
